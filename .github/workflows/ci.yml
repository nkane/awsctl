name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build / vet / test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

  integration:
    name: integration (localstack)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: start localstack
        run: docker compose -f docker-compose.localstack.yml up -d

      - name: wait for localstack health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4566/_localstack/health >/dev/null 2>&1; then
              echo "localstack ready"
              exit 0
            fi
            sleep 2
          done
          echo "localstack did not become healthy" >&2
          docker compose -f docker-compose.localstack.yml logs
          exit 1

      - name: seed fixtures
        run: ./scripts/seed-localstack.sh
        env:
          AWSCTL_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1

      - name: integration tests
        run: go test -tags=integration ./...
        env:
          AWSCTL_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1

      - name: localstack logs on failure
        if: failure()
        run: docker compose -f docker-compose.localstack.yml logs

      - name: stop localstack
        if: always()
        run: docker compose -f docker-compose.localstack.yml down -v

  goreleaser:
    name: goreleaser snapshot
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: goreleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean
